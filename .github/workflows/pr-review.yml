  name: Automated PR Review Pipeline

  on:
    pull_request:
      branches:
        - master

  jobs:
    review-and-test:
      runs-on: ubuntu-latest

      steps:

        # 1. Download repository code
        - name: Checkout Repository
          uses: actions/checkout@v4

        # 2. Install Java JDK 21
        - name: Set Up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'

        # 3. Check if Java files exist
        - name: Check Java Files
          run: |
            echo "Checking Java files..."
            
            if ls src/*.java 1> /dev/null 2>&1; then
              echo "Java files found inside src/ directory."
            else
              echo "Error: No Java files found!"
              exit 1
            fi

        # 4. Compile Java Project
        - name: Compile Java Project
          run: |
            echo "Compiling Java project..."
            
            # Create output folder for compiled files
            mkdir bin
            
            # Compile project
            javac -sourcepath src -d bin src/Main.java
            
            echo "Compilation successful!"

        # 5. Automated Review Message
        - name: Automated Review
          run: |
            echo "Automated PR review completed successfully."
            echo "No compilation or dependency errors found."
